spring.application.name=blog

# Database Connection (Supabase in Cloud / Postgres in Local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changemeinprod!}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Security (Env variable in Cloud / Generic key in Local)
jwt.secret=${JWT_SECRET:EstaEsUnaClaveSuperSecretaParaMiBlogAppQueTieneMasDe32Caracteres!}

# Max file size configuration for uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Google Authentication
google.client.id=${GOOGLE_CLIENT_ID:799849990519-iq2kqh4lguasovp9n48mclj8n9u7noa5.apps.googleusercontent.com}

# Mail Configuration (Secure SMTP via environment variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000